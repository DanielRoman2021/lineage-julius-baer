<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;}html,body{margin:0;padding:0;background:#E8E4DB;}::selection{background:#C9A86A;color:#141E3C;}.scroll::-webkit-scrollbar{width:0;}</style>
</helmet>
<div style="min-height:924px; background:radial-gradient(120% 90% at 50% 0%, #EFEBE2, #E2DDD3); display:flex; align-items:flex-start; justify-content:center; padding:40px; font-family:'Archivo',sans-serif;">
  <div style="width:392px; height:844px; background:#F7F5F0; border-radius:46px; border:11px solid #141E3C; box-shadow:0 40px 80px -30px rgba(20,30,60,.55); overflow:hidden; position:relative; display:flex; flex-direction:column;">

    <div style="height:46px; flex:none; display:flex; align-items:center; justify-content:space-between; padding:0 26px; font-size:13px; font-weight:600; color:#141E3C;">
      <span>9:41</span>
      <span style="display:flex; gap:6px; align-items:center;"><svg width="17" height="11" viewBox="0 0 17 11" fill="#141E3C"><rect x="0" y="6" width="3" height="5" rx="1"/><rect x="4.5" y="4" width="3" height="7" rx="1"/><rect x="9" y="2" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg><svg width="22" height="11" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="19" height="10" rx="2.5" stroke="#141E3C"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.2" fill="#141E3C"/><rect x="21" y="4" width="2" height="4" rx="1" fill="#141E3C"/></svg></span>
    </div>

    <!-- header -->
    <div style="flex:none; padding:6px 18px 14px; border-bottom:1px solid #EDE7DA; display:flex; align-items:center; gap:12px;">
      <a href="Client%20-%20Home.dc.html" style="text-decoration:none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3C4456" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
      <span style="width:40px; height:40px; border-radius:50%; background:#1B2A4A; color:#F7F5F0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;">MB</span>
      <div style="flex:1;"><div style="font-size:15px; color:#141E3C; font-weight:600;">Markus Brunner</div><div style="font-size:11.5px; color:#5E806B; display:flex; align-items:center; gap:5px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5E806B" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>Encrypted and logged</div></div>
    </div>

    <!-- thread -->
    <div class="scroll" style="flex:1; overflow-y:auto; padding:16px 18px;">

      <!-- pinned -->
      <div style="background:#FBF3E2; border:1px solid #E7D4AE; border-radius:14px; padding:14px 16px; margin-bottom:18px;">
        <div style="display:flex; align-items:center; gap:7px; font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:#A8854A; font-weight:700; margin-bottom:7px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#A8854A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v5.76l1.5 3.24H7.5z"/></svg>Pinned note
        </div>
        <div style="font-size:13.5px; color:#3C4456; line-height:1.6;">Thursday at 3pm to walk through the trust draft. I will share the document here first.</div>
      </div>

      <div style="text-align:center; font-size:11px; color:#A6ADBB; margin-bottom:16px;">Today</div>

      <sc-for list="{{ msgs }}" as="m" hint-placeholder-count="4">
        <sc-if value="{{ m.them }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex; margin-bottom:12px;">
            <div style="max-width:78%; background:#fff; border:1px solid #EAE4D7; border-radius:4px 16px 16px 16px; padding:11px 14px;">
              <div style="font-size:14px; color:#2C3344; line-height:1.5;">{{ m.text }}</div>
              <div style="font-size:10px; color:#B4BAC6; margin-top:4px;">{{ m.time }}</div>
            </div>
          </div>
        </sc-if>
        <sc-if value="{{ m.mine }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
            <div style="max-width:78%; background:#1B2A4A; border-radius:16px 4px 16px 16px; padding:11px 14px;">
              <div style="font-size:14px; color:#F4F1EA; line-height:1.5;">{{ m.text }}</div>
              <div style="font-size:10px; color:#8A93A8; margin-top:4px; text-align:right;">{{ m.time }}</div>
            </div>
          </div>
        </sc-if>
      </sc-for>

    </div>

    <!-- input -->
    <div style="flex:none; padding:12px 16px 16px; border-top:1px solid #EDE7DA; background:#FBFAF6;">
      <div style="display:flex; gap:9px; align-items:center;">
        <input value="{{ draft }}" onInput="{{ onInput }}" onKeyDown="{{ onKey }}" placeholder="Write a reply" style="flex:1; min-width:0; padding:13px 16px; border:1px solid #E4DFD3; border-radius:999px; font-family:'Archivo',sans-serif; font-size:14px; color:#141E3C; outline:none; background:#fff;" />
        <button onClick="{{ onAdd }}" style="width:46px; height:46px; flex:none; border:none; border-radius:50%; background:#C9A86A; display:flex; align-items:center; justify-content:center; cursor:pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#141E3C" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:472,&quot;height&quot;:924}}">
class Component extends DCLogic {
  state = {
    draft:'',
    msgs:[
      {them:true, text:'Hi Sarah. Two small things left and your onboarding is finished.', time:'14:02'},
      {them:true, text:'I have set aside time on Thursday to walk through the trust draft.', time:'14:02'},
      {mine:true, text:'Thank you Markus. Thursday works. Should I bring anything?', time:'14:18'},
      {them:true, text:'Just yourself. I will have the draft and your plan ready on screen.', time:'14:25'}
    ]
  };
  add(){ const t=this.state.draft.trim(); if(!t) return; this.setState(s=>({ draft:'', msgs:[...s.msgs, {mine:true, text:t, time:'now'}] })); }
  renderVals(){
    return {
      msgs:this.state.msgs,
      draft:this.state.draft,
      onInput:(e)=>this.setState({draft:e.target.value}),
      onKey:(e)=>{ if(e.key==='Enter') this.add(); },
      onAdd:()=>this.add()
    };
  }
}
</script>
</body>
</html>
